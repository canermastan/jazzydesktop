<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} | Jazzy Desktop</title>
    
    <script>
        (function(){
            var base = document.createElement('base');
            var href = window.location.href.split('#')[0].split('?')[0];
            var docsIndex = href.indexOf('/docs/');
            if (docsIndex !== -1) {
                base.href = href.substring(0, docsIndex + 1);
            } else {
                if (href.endsWith('.html')) {
                    base.href = href.substring(0, href.lastIndexOf('/') + 1);
                } else if (!href.endsWith('/')) {
                    base.href = href + '/';
                } else {
                    base.href = href;
                }
            }
            document.head.appendChild(base);
        })();
    </script>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Jazzy Desktop is a next-generation framework for building incredibly fast, cross-platform modern desktop applications using Nim and web technologies. Part of the Jazzy Framework ecosystem.">
    <meta name="keywords" content="Jazzy Desktop, Jazzy Framework, Nim Desktop Framework, Cross-platform Apps, Desktop Apps, Nimlang, Web to Desktop">
    <meta name="author" content="Caner Mastan">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Social -->
    <meta property="og:title" content="{{ title }} | Jazzy Desktop">
    <meta property="og:description" content="Build incredibly fast, cross-platform modern desktop applications using Nim and web technologies. From the creator of Jazzy Framework.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://canermastan.github.io/jazzydesktop/">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="public/vendor/tailwindcss.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['Roboto Mono', 'monospace'],
                    },
                    colors: {
                        background: '#1b1b1f',
                        surface: '#202127',
                        surfaceHover: '#2a2b32',
                        border: '#2e2e32',
                        borderHover: '#44444a',
                        purple: {
                            neon: '#c084fc',
                            glow: '#a855f7',
                            dark: '#581c87',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Alpine.js -->
    <script defer src="public/vendor/alpine.min.js"></script>

    <link rel="icon" type="image/png" href="/jazzydesktop/public/images/logo_face.png">
    <link rel="stylesheet" href="public/css/style.css">
</head>
<body class="bg-background text-neutral-300 relative min-h-screen flex flex-col">
    
    <div class="bg-animated"></div>

    <header x-data="searchModal()" @keydown.window.prevent.ctrl.k="searchOpen = true" @keydown.window.prevent.meta.k="searchOpen = true" class="nav-glass fixed w-full top-0 z-50 transition-all duration-300">
        <div class="w-full px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-14">
                <a href="./" class="flex-shrink-0 flex items-center gap-3 cursor-pointer group">
                    <img src="public/images/logo.png" alt="Jazzy Desktop Logo" class="w-10 h-10 object-contain drop-shadow-[0_0_8px_rgba(168,85,247,0.4)] transition-transform group-hover:scale-110">
                    <span class="font-semibold text-base text-white tracking-wide">Jazzy<span class="text-neutral-500 font-normal">Desktop</span></span>
                </a>
                
                <nav class="hidden md:flex items-center space-x-6">
                    <button @click="searchOpen = true" class="flex items-center gap-2 text-xs text-neutral-400 bg-surface border border-border hover:border-borderHover rounded px-2.5 py-1.5 transition-colors focus:outline-none focus:ring-1 focus:ring-purple-glow/50">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <span class="mr-1">Search</span>
                        <kbd class="font-mono bg-background border border-border rounded px-1 text-neutral-500 text-[10px]">Ctrl K</kbd>
                    </button>

                    <div class="h-4 w-px bg-border"></div>

                    <a href="docs/getting-started" class="text-sm font-medium text-neutral-400 hover:text-white transition-colors">Guide</a>

                    <a href="https://github.com/canermastan/jazzy-desktop" target="_blank" class="text-neutral-400 hover:text-white transition-colors flex items-center gap-2">
                        <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd" /></svg>
                    </a>
                </nav>
            </div>
        </div>

        <div x-show="searchOpen" style="display: none;" class="fixed inset-0 z-50 flex items-start justify-center pt-24 pb-4 px-4" @keydown.escape.window="searchOpen = false">
            <div x-show="searchOpen" x-transition.opacity class="fixed inset-0 bg-background/80 backdrop-blur-sm" @click="searchOpen = false"></div>
            
            <div x-show="searchOpen" 
                 x-transition:enter="ease-out duration-150"
                 x-transition:enter-start="opacity-0 scale-95"
                 x-transition:enter-end="opacity-100 scale-100"
                 x-transition:leave="ease-in duration-100"
                 x-transition:leave-start="opacity-100 scale-100"
                 x-transition:leave-end="opacity-0 scale-95"
                 class="relative w-full max-w-xl bg-surface border border-border rounded-lg shadow-2xl overflow-hidden">
                <div class="flex items-center px-4 py-3 border-b border-border">
                    <svg class="w-4 h-4 text-neutral-400 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" x-model="searchQuery" x-ref="searchInput" class="w-full bg-transparent border-none focus:outline-none focus:ring-0 text-white placeholder-neutral-500 text-sm" placeholder="Search documentation..." @keydown.enter.prevent="searchOpen = false">
                    <button @click="searchOpen = false" class="text-[10px] font-mono bg-background border border-border rounded px-1.5 py-0.5 text-neutral-500 hover:text-white transition-colors">ESC</button>
                </div>
                <div class="max-h-[60vh] overflow-y-auto p-2">
                    <template x-if="results.length === 0 && searchQuery.trim() !== ''">
                        <div class="p-4 text-center py-10 text-neutral-500 text-xs">
                            No results found for "<span x-text="searchQuery"></span>"
                        </div>
                    </template>
                    <template x-if="searchQuery.trim() === ''">
                        <div class="p-4 text-center py-10 text-neutral-500 text-xs">
                            Type to search documentation
                        </div>
                    </template>
                    <template x-for="item in results" :key="item.path">
                        <a :href="'docs/' + item.path" @click="searchOpen = false" class="block p-3 hover:bg-surfaceHover rounded-lg transition-colors border border-transparent hover:border-border cursor-pointer">
                            <div class="text-sm font-medium text-white mb-0.5" x-text="item.title"></div>
                            <div class="text-xs text-neutral-500" x-text="item.category"></div>
                            <template x-if="item.snippet">
                                <div class="text-xs text-neutral-400 mt-2 line-clamp-2" x-html="item.snippet"></div>
                            </template>
                        </a>
                    </template>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow pt-14 flex flex-col">
        <!-- Edge-to-Edge Banner -->
        <div class="w-full bg-[#1b1b1f] border-b border-border/50 py-2.5 px-4 text-center z-40 relative">
            <a href="https://canermastan.github.io/jazzyframework/" target="_blank" class="text-[11px] md:text-xs font-mono font-medium text-neutral-500 tracking-wide uppercase transition-all duration-200 text-gradient-hover">
                This website is built with Jazzy Framework
            </a>
        </div>

        @yield("content")
    </main>

    <footer class="border-t border-border mt-auto py-8 text-xs">
        <div class="w-full px-4 sm:px-6 lg:px-8 flex flex-col justify-center items-center gap-3 text-center">
            <div class="flex items-center gap-2">
                <span class="text-neutral-500 font-medium tracking-wide">Jazzy Desktop</span>
            </div>
            <p class="text-neutral-500">
                Released under the <a href="#" class="text-neutral-400 hover:text-white transition-colors">MIT License</a>.
            </p>
        </div>
    </footer>

    <script src="public/js/main.js"></script>
</body>
</html>
